services:
  - type: web
    name: cinematch-ai
    env: python
    rootDir: Major Project
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir src app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
